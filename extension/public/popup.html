<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h1 {
            background: rgba(0, 0, 0, 0.2);
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .app {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-selector h3 {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .mode-btn {
            background: white;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .mode-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        .mode-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .mode-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        .analyze-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .analyze-btn:hover:not(:disabled) {
            background: #764ba2;
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            color: white;
            text-align: center;
            padding: 32px 16px;
            font-size: 14px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .result-panel {
            background: white;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .result-panel h4 {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .result-panel p {
            font-size: 14px;
            color: #333;
        }

        .trend-value {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .confidence-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .signals {
            margin-top: 8px;
        }

        .signals p {
            font-size: 13px;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="background.js"></script>
</body>
</html>
